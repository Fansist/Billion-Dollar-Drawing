# Render Blueprint — The Billion Dollar Drawing (live shared canvas)
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: in the Render dashboard choose "New +" -> "Blueprint", connect this
# repo, and Render reads this file. It runs the bundled Node server (server.js),
# which serves the site AND the /api shared-canvas backend, so every visitor
# paints the SAME drawing.
#
# Free plan caveats: the instance cold-starts after idle, and the shared-canvas
# data file is ephemeral (it resets when the instance is recreated, e.g. on
# redeploy). For a DURABLE shared canvas, attach the persistent disk below
# (requires a paid instance type) and set DATA_DIR to its mount path.
#
# Prefer a free, solo (per-browser) canvas with no cold starts and no backend?
# Set `runtime: static`, add `staticPublishPath: .`, and drop the build/start
# commands — the front end falls back to localStorage automatically.

services:
  - type: web
    name: billion-dollar-drawing
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Durable shared canvas (needs the disk below + a paid instance):
      # - key: DATA_DIR
      #   value: /data
    # disk:
    #   name: canvas-data
    #   mountPath: /data
    #   sizeGB: 1
